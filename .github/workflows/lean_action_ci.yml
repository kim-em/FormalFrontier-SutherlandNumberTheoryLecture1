name: Lean Action CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: leanprover/lean-action@v1

      # Build LeanArchitect's extract_blueprint binary
      - name: Build extract_blueprint
        run: lake build LeanArchitect

      # Extract blueprint from compiled Lean using LeanArchitect --all
      - name: Extract blueprint data
        run: |
          for f in SutherlandNumberTheoryLecture1/Chapter1/*.lean; do
            mod=$(echo "$f" | sed 's|/|.|g; s|\.lean$||')
            lake env .lake/packages/LeanArchitect/.lake/build/bin/extract_blueprint \
              single --all --json --build .lake/build "$mod"
          done

      # Generate content.tex with Lean annotations
      - name: Generate blueprint content
        run: python3 scripts/generate_blueprint.py

      # Build blueprint HTML
      - name: Install leanblueprint
        run: pip install leanblueprint

      - name: Build blueprint
        run: leanblueprint web

      # Build API docs
      - uses: leanprover-community/docgen-action@v1

      # Combine docs and blueprint into single site
      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy API docs
          cp -r .lake/build/doc _site/docs
          # Copy blueprint
          cp -r blueprint/web _site/blueprint
          # Create index page redirecting to blueprint
          cat > _site/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=blueprint/"></head>
          <body><a href="blueprint/">Blueprint</a> | <a href="docs/">API Docs</a></body>
          </html>
          INDEXEOF

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
