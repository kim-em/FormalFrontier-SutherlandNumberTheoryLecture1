name = "SutherlandNumberTheoryLecture1"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["SutherlandNumberTheoryLecture1"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "LeanArchitect"
git = "https://github.com/kim-em/LeanArchitect.git"
rev = "blueprint-all"

[[lean_lib]]
name = "SutherlandNumberTheoryLecture1"
